name: Documentation fix
description: Report unclear or incorrect public documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Please keep public reports free of credentials, signing keys, private dumps, generated images, device IDs, and proprietary redistribution material.
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or name the file and section that needs attention.
      placeholder: docs/RABOBSTER_REBUILD_GUIDE.md, Installing CipherOS
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Suggested correction
      description: Explain what should change and why.
    validations:
      required: true
